<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Auto History Eraser</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .auth-bar .user-email {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .auth-bar .auth-action-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-main);
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }

    .auth-bar .auth-action-btn:hover {
      background: var(--border);
    }

    .sync-status {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 8px;
      font-style: italic;
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Auth bar -->
    <div id="authBar" class="auth-bar" style="display: none;">
      <span id="userEmail" class="user-email"></span>
      <button id="logoutBtn" class="auth-action-btn">Đăng xuất</button>
    </div>
    <div id="loginBar" class="auth-bar" style="display: none;">
      <span class="user-email" style="color: var(--text-muted);">Chưa đăng nhập</span>
      <button id="loginBtn" class="auth-action-btn" style="color: var(--primary); border-color: var(--primary);">Đăng
        nhập</button>
    </div>

    <p class="desc">Thêm danh sách tên miền bạn muốn chặn. Mọi truy cập vào các trang này sẽ bị chặn ngay lập tức.</p>

    <div id="addCurrentContainer" class="current-site-container" style="display: none;">
      <span id="currentDomain" class="current-domain-text"></span>
      <button id="addCurrentBtn" class="icon-add-btn" title="Thêm vào danh sách">
        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
          stroke-linecap="round" stroke-linejoin="round" class="css-i6dzq1">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>

    <button id="openOptionsBtn" class="add-btn list-btn">
      Mở danh sách mục tiêu
    </button>

    <div id="syncStatus" class="sync-status" style="display: none;"></div>
  </div>
  <script src="lib/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="sync.js"></script>
  <script src="popup.js"></script>
</body>

</html>
